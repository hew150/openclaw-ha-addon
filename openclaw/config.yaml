name: "OpenClaw Agent Pro"
description: "融合原生浏览器沙箱与满血极客工具链的 AI 大脑 🦞"
version: "2026.3.23-2-auto.b38"
slug: "openclaw_agent_pro"
init: false
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:robot-excited-outline
panel_title: "OpenClaw"

# 🌟 核心魔法：直接从你的云端镜像库拉取预编译黑盒
image: ghcr.io/hew150/openclaw-addon-{arch}

ports:
  8080/tcp: 8080  # 暴露给 HA Assist 语音助手的 API 端口
  8099/tcp: 8099  # Web 控制台端口
map:
  - config:rw
  - share:rw
options:
  provider: "nvidia"
  api_key: ""
  gateway_bind_mode: "auto"
  http_proxy: ""
schema:
  provider: list(nvidia|groq|openrouter|openai|anthropic|xai)
  api_key: str?  # 🌟 必须改为 str?
  gateway_bind_mode: list(auto|lan|localhost)
  http_proxy: str? # 🌟 必须改为 str?
